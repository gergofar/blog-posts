<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="From a single working demo to a resilient production system">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d0a1e"/>
      <stop offset="1" stop-color="#0b0d1d"/>
    </linearGradient>
    <linearGradient id="arrow" x1="520" y1="300" x2="700" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5c28ff"/>
      <stop offset="1" stop-color="#7bf7c5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Demo panel -->
  <rect x="80" y="160" width="360" height="280" rx="24" fill="#12152b" stroke="#ffffff22"/>
  <circle cx="180" cy="250" r="26" fill="#c6f046"/>
  <rect x="150" y="300" width="220" height="14" rx="7" fill="#ffffff22"/>
  <rect x="150" y="332" width="160" height="14" rx="7" fill="#ffffff14"/>
  <text x="260" y="408" font-family="sans-serif" font-size="22" font-weight="700" fill="#7bf7c5" text-anchor="middle">One happy path</text>
  <!-- Arrow -->
  <path d="M520 300 H672" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M664 282 L700 300 L664 318 Z" fill="#7bf7c5"/>
  <!-- Production panel -->
  <rect x="760" y="120" width="360" height="360" rx="24" fill="#12152b" stroke="#7bf7c540"/>
  <g stroke="#5c28ff" stroke-width="3" fill="none">
    <circle cx="940" cy="220" r="34"/>
    <circle cx="860" cy="330" r="26"/>
    <circle cx="1020" cy="330" r="26"/>
    <circle cx="940" cy="410" r="22"/>
  </g>
  <g stroke="#7bf7c5" stroke-width="3">
    <path d="M928 250 L872 312"/>
    <path d="M952 250 L1008 312"/>
    <path d="M866 354 L928 392"/>
    <path d="M1014 354 L952 392"/>
  </g>
  <circle cx="940" cy="220" r="10" fill="#c6f046"/>
  <text x="940" y="470" font-family="sans-serif" font-size="22" font-weight="700" fill="#7bf7c5" text-anchor="middle">Reliable under load</text>
</svg>
